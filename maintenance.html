<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="./frontend/js/console-control.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://favicon.rysn-craft.workers.dev">
    <meta name="description" content="Experience Connect - Manutenção">
    <title>Manutenção | Experience Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./frontend/styles/landing.css">
    <link rel="stylesheet" href="./frontend/styles/status-ec.css">
</head>
<body>
    <main class="status-container" role="main">
        
        <div class="season-badge">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
            Experience Connect
        </div>

        
        <div class="status-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
                <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
                <path d="M6 2v2"/><path d="M10 2v2"/><path d="M14 2v2"/>
            </svg>
        </div>

        
        <h1 class="status-title">Manutenção</h1>

       
        <p class="status-message" id="maintenance-message">
            Estamos realizando melhorias na plataforma.<br>
            Voltaremos em breve!
        </p>

       
        <div class="info-box info-box--warning" id="estimated-return" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span><strong>Previsão de retorno:</strong> <span id="return-time-display">Em breve</span></span>
        </div>

        
        <footer class="status-footer">
            Agradecemos sua compreensão. Em caso de dúvidas, entre em contato com o suporte.
        </footer>
    </main>

   
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const customMessage = urlParams.get('message');
            const estimatedReturn = urlParams.get('estimated_return');

            if (customMessage) {
                document.getElementById('maintenance-message').innerHTML = customMessage.replace(/\n/g, '<br>');
            }

            if (estimatedReturn) {
                const returnBox = document.getElementById('estimated-return');
                const returnDisplay = document.getElementById('return-time-display');
                const returnDate = new Date(estimatedReturn);
                if (!isNaN(returnDate.getTime())) {
                    returnDisplay.textContent = returnDate.toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } else {
                    returnDisplay.textContent = estimatedReturn;
                }
                returnBox.style.display = 'flex';
            }
        })();
    </script>
</body>
</html>
