services:
  - type: web
    name: cxgame-admin-service
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: admin-service
    buildCommand: pip install --upgrade pip && pip install -c constraints.txt -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_BASE64
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: REDIS_URL
        sync: false
