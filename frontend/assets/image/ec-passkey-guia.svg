<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Crie sua passkey — Experience Connect</title>
  <desc id="desc">Guia visual em três passos para criar uma passkey durante a ativação de conta.</desc>
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#0A0A0A" opacity=".09"/>
    </pattern>
  </defs>

  <!-- Canvas EC -->
  <rect width="1600" height="1000" fill="#F5F0E6"/>
  <rect width="1600" height="1000" fill="url(#dots)"/>

  <!-- Black header -->
  <path d="M0 0H1600V236H0Z" fill="#0A0A0A"/>
  <path d="M0 236H1600V250H0Z" fill="#FFC700"/>
  <path d="M1210 0h390v236h-438z" fill="#161616"/>

  <!-- Real EC mark, yellow paths from the official vector -->
  <g transform="translate(66 42) scale(.245)" fill="#FFD200">
    <path d="M438.7 296.91 436.2 351.13 447.87 377.81 471.23 392.83 512.93 394.5 528.77 441.2 556.3 481.23 598.83 514.6 643.87 531.28 809.01 534.61 860.72 523.77 897.41 503.75 927.44 476.23 950.79 439.53 961.63 406.17 964.14 357.8 868.22 357.8 865.72 386.99 858.22 404.5 842.37 422.85 824.85 433.69 807.34 438.7 661.38 437.03 633.03 422.02 618.85 405.34 617.18 395.33 686.41 394.5 706.42 386.99 718.1 376.15 728.11 352.79 728.11 305.25 721.43 287.74 705.59 271.89 683.07 264.39 481.23 264.39 455.38 274.4ZM476.23 311.09 480.4 306.09 482.9 305.25 683.07 305.25 688.91 311.09 688.91 348.62 685.57 352.79 681.4 354.46 482.9 354.46 476.23 349.46Z"/>
    <path d="M81.73 492.08 105.92 529.61 150.96 549.62 582.99 549.62 519.6 487.07 492.08 438.7 198.5 430.36 197.66 339.45 422.85 339.45 437.03 275.23 460.38 257.71 499.58 252.71 497.08 230.19 197.66 230.19 196 155.13 207.67 141.78 555.46 141.78 523.77 201.83 512.93 252.71 608.01 252.71 623.85 214.35 661.38 189.32 778.98 186.82 840.7 202.67 863.22 232.69 867.39 264.39 964.14 264.39 958.3 210.18 907.42 132.61 834.03 95.91 665.55 93.41 584.65 120.1 582.99 29.19 134.28 32.53 97.58 57.55 79.23 98.42Z"/>
  </g>

  <!-- Header copy -->
  <g font-family="'Nimbus Sans Narrow','Arial Narrow',sans-serif">
    <text x="350" y="104" fill="#FFFFFF" font-size="71" font-weight="800" letter-spacing="1">CRIE SUA PASSKEY</text>
    <text x="354" y="155" fill="#FFFFFF" font-family="'Nimbus Sans',Arial,sans-serif" font-size="27">Ative sua conta e entre sem precisar decorar senha.</text>
    <rect x="350" y="178" width="470" height="9" fill="#FFC700"/>
  </g>

  <!-- EC sticker -->
  <g transform="translate(1322 58) rotate(3)">
    <rect x="6" y="7" width="202" height="78" rx="9" fill="#FFC700"/>
    <rect width="202" height="78" rx="9" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
    <text x="101" y="34" text-anchor="middle" fill="#0A0A0A" font-family="'Nimbus Sans',Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2">ATIVAÇÃO</text>
    <text x="101" y="61" text-anchor="middle" fill="#0A0A0A" font-family="'Nimbus Sans Mono',monospace" font-size="19" font-weight="700">SEM SENHA</text>
  </g>

  <!-- Section label -->
  <g transform="translate(70 286)">
    <rect x="4" y="5" width="238" height="42" rx="5" fill="#FFC700"/>
    <rect width="238" height="42" rx="5" fill="#0A0A0A"/>
    <text x="119" y="28" text-anchor="middle" fill="#FFFFFF" font-family="'Nimbus Sans',Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2">É RÁPIDO: 3 PASSOS</text>
  </g>

  <!-- Card shadows -->
  <g fill="#0A0A0A">
    <rect x="78" y="364" width="440" height="444" rx="17"/>
    <rect x="584" y="364" width="440" height="444" rx="17"/>
    <rect x="1090" y="364" width="440" height="444" rx="17"/>
  </g>

  <!-- Cards -->
  <g fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4">
    <rect x="68" y="354" width="440" height="444" rx="17"/>
    <rect x="574" y="354" width="440" height="444" rx="17"/>
    <rect x="1080" y="354" width="440" height="444" rx="17"/>
  </g>

  <!-- Step labels -->
  <g font-family="'Nimbus Sans Mono',monospace" font-size="25" font-weight="700" fill="#0A0A0A">
    <g transform="translate(92 378)"><rect x="5" y="5" width="70" height="52" rx="6" fill="#0A0A0A"/><rect width="70" height="52" rx="6" fill="#FFC700" stroke="#0A0A0A" stroke-width="3"/><text x="35" y="35" text-anchor="middle">01</text></g>
    <g transform="translate(598 378)"><rect x="5" y="5" width="70" height="52" rx="6" fill="#0A0A0A"/><rect width="70" height="52" rx="6" fill="#FFC700" stroke="#0A0A0A" stroke-width="3"/><text x="35" y="35" text-anchor="middle">02</text></g>
    <g transform="translate(1104 378)"><rect x="5" y="5" width="70" height="52" rx="6" fill="#0A0A0A"/><rect width="70" height="52" rx="6" fill="#FFC700" stroke="#0A0A0A" stroke-width="3"/><text x="35" y="35" text-anchor="middle">03</text></g>
  </g>

  <!-- Icon 1: button + cursor -->
  <g transform="translate(288 530)">
    <rect x="-119" y="-57" width="238" height="114" rx="12" fill="#FFC700" stroke="#0A0A0A" stroke-width="5"/>
    <text x="0" y="10" text-anchor="middle" fill="#0A0A0A" font-family="'Nimbus Sans',Arial,sans-serif" font-size="25" font-weight="800">CRIAR PASSKEY</text>
    <path d="M72 43v89l23-20 17 37 24-11-17-36h31Z" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="5" stroke-linejoin="round"/>
    <path d="M113-94v25M78-82l15 20M148-82l-15 20" fill="none" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Icon 2: device + biometric/PIN -->
  <g transform="translate(794 530)" stroke="#0A0A0A" stroke-width="5" stroke-linejoin="round">
    <rect x="-112" y="-91" width="176" height="206" rx="19" fill="#0A0A0A"/>
    <rect x="-97" y="-72" width="146" height="157" rx="9" fill="#FFC700"/>
    <path d="M-63-34v-17h18M14-51h18v17M32 30v17H14m-59 0h-18V30" fill="none"/>
    <circle cx="-16" cy="-3" r="28" fill="none"/>
    <path d="M-32 4c3-22 34-22 35 1 0 16-5 27-12 38M-24 44c7-11 11-24 9-38-1-8 10-10 12-2 3 13 0 27-6 38" fill="none" stroke-linecap="round"/>
    <circle cx="66" cy="82" r="52" fill="#FFFFFF"/>
    <g fill="#0A0A0A" stroke="none">
      <circle cx="48" cy="67" r="5"/><circle cx="66" cy="67" r="5"/><circle cx="84" cy="67" r="5"/>
      <circle cx="48" cy="85" r="5"/><circle cx="66" cy="85" r="5"/><circle cx="84" cy="85" r="5"/>
      <circle cx="48" cy="103" r="5"/><circle cx="66" cy="103" r="5"/><circle cx="84" cy="103" r="5"/>
    </g>
  </g>

  <!-- Icon 3: protected account -->
  <g transform="translate(1300 510) scale(.80)" stroke="#0A0A0A" stroke-linejoin="round">
    <path d="M0-99c37 26 76 36 112 42v72c0 76-47 119-112 151C-65 134-112 91-112 15v-72c36-6 75-16 112-42Z" fill="#FFC700" stroke-width="6"/>
    <path d="m-55 20 37 37 77-86" fill="none" stroke-width="17" stroke-linecap="round"/>
  </g>

  <!-- Card captions -->
  <g font-family="'Nimbus Sans',Arial,sans-serif" fill="#0A0A0A" text-anchor="middle">
    <text x="288" y="697" font-family="'Nimbus Sans Narrow','Arial Narrow',sans-serif" font-size="34" font-weight="800">CLIQUE EM CRIAR PASSKEY</text>
    <text x="288" y="738" font-size="22"><tspan x="288">O navegador abrirá a confirmação</tspan><tspan x="288" dy="29">do seu dispositivo.</tspan></text>

    <text x="794" y="697" font-family="'Nimbus Sans Narrow','Arial Narrow',sans-serif" font-size="34" font-weight="800">CONFIRME SUA IDENTIDADE</text>
    <text x="794" y="738" font-size="22"><tspan x="794">Use rosto, digital ou PIN,</tspan><tspan x="794" dy="29">conforme aparecer na tela.</tspan></text>

    <text x="1300" y="697" font-family="'Nimbus Sans Narrow','Arial Narrow',sans-serif" font-size="34" font-weight="800">PRONTO. CONTA ATIVADA!</text>
    <text x="1300" y="738" font-size="22"><tspan x="1300">Da próxima vez, você entrará</tspan><tspan x="1300" dy="29">sem digitar uma senha.</tspan></text>
  </g>

  <!-- Bottom information strip -->
  <g transform="translate(68 855)">
    <rect x="9" y="9" width="1464" height="92" rx="13" fill="#FFC700"/>
    <rect width="1464" height="92" rx="13" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="4"/>
    <g transform="translate(52 46)" fill="none" stroke="#FFC700" stroke-width="4">
      <circle r="25"/>
      <path d="M0-9v2m0 10v16" stroke-linecap="round"/>
    </g>
    <text x="100" y="42" fill="#FFFFFF" font-family="'Nimbus Sans',Arial,sans-serif" font-size="21">A passkey usa a proteção do seu próprio dispositivo.</text>
    <text x="100" y="69" fill="#FFC700" font-family="'Nimbus Sans',Arial,sans-serif" font-size="18" font-weight="700">RÁPIDO  •  SEGURO  •  SEM SENHA</text>
    <path d="M1040 22v48" stroke="#333333" stroke-width="2"/>
    <text x="1080" y="45" fill="#FFFFFF" font-family="'Nimbus Sans Mono',monospace" font-size="15">EXPERIENCE CONNECT</text>
    <text x="1080" y="68" fill="#77736E" font-family="'Nimbus Sans Mono',monospace" font-size="13">CONTA PROTEGIDA POR PASSKEY</text>
  </g>

  <!-- Small EC doodles -->
  <g fill="none" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round">
    <path d="M33 311h29m-14-14v29M1545 300h29m-14-14v29"/>
    <path d="M529 835c16-12 33-12 49 0s33 12 49 0M1034 836c16-12 33-12 49 0s33 12 49 0"/>
  </g>
</svg>
